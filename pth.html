<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通話語音助手</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1d1d1f;
            --accent-color: #007aff;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        #result-display {
            width: 100%;
            height: 150px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: var(--border-radius);
            padding: 1rem;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            text-align: left;
            overflow-y: auto;
            word-wrap: break-word;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-record {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-record.recording {
            background-color: #ff3b30;
            animation: pulse 1.5s infinite;
        }

        .btn-speak {
            background-color: #e8e8ed;
            color: var(--text-color);
        }

        button:active {
            transform: scale(0.97);
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 12px;
            color: #86868b;
        }

        kbd {
            background: #eee;
            border-radius: 3px;
            padding: 2px 5px;
            font-size: 11px;
            border: 1px solid #ccc;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>普通話分析</h1>
    
    <div id="result-display" placeholder="辨識結果將顯示在此..."></div>

    <div class="controls">
        <button id="recordBtn" class="btn-record">開始錄音</button>
        <button id="speakBtn" class="btn-speak">朗讀文字</button>
    </div>

    <div class="hint">
        快速鍵：<kbd>Space</kbd> 錄音 / <kbd>Enter</kbd> 朗讀
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const speakBtn = document.getElementById('speakBtn');
    const display = document.getElementById('result-display');

    // --- 1. 錄音辨識 (Speech Recognition) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN'; // 設定為普通話
        recognition.interimResults = true; // 顯示中間結果
        recognition.continuous = false;

        recognition.onresult = (event) => {
            let transcript = Array.from(event.results)
                .map(result => result[0].transcript)
                .join('');
            display.innerText = transcript;
        };

        recognition.onend = () => {
            stopRecordingUI();
        };

        recognition.onerror = (event) => {
            console.error("辨識錯誤: ", event.error);
            stopRecordingUI();
        };
    } else {
        display.innerText = "抱歉，您的瀏覽器不支援語音辨識功能。";
        recordBtn.disabled = true;
    }

    function toggleRecording() {
        if (isRecording) {
            recognition.stop();
            stopRecordingUI();
        } else {
            display.innerText = "";
            recognition.start();
            startRecordingUI();
        }
    }

    function startRecordingUI() {
        isRecording = true;
        recordBtn.innerText = "停止錄音";
        recordBtn.classList.add('recording');
    }

    function stopRecordingUI() {
        isRecording = false;
        recordBtn.innerText = "開始錄音";
        recordBtn.classList.remove('recording');
    }

    // --- 2. 語音合成 (Text to Speech) ---
    function speakText() {
        const text = display.innerText;
        if (!text) return;

        window.speechSynthesis.cancel(); // 先停止之前的聲音

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9; // 語速稍微放慢

        // 挑選最佳普通話嗓音
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.lang.includes('zh-CN') && v.name.includes('Google')) || 
                               voices.find(v => v.lang.includes('zh-CN'));
        
        if (preferredVoice) utterance.voice = preferredVoice;

        window.speechSynthesis.speak(utterance);
    }

    // --- 3. 事件監聽與鍵盤快捷鍵 ---
    recordBtn.addEventListener('click', toggleRecording);
    speakBtn.addEventListener('click', speakText);

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault(); // 防止頁面捲動
            toggleRecording();
        }
        if (e.code === 'Enter') {
            speakText();
        }
    });

    // 預加載語音列表 (部分瀏覽器需要)
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</body>
</html>
