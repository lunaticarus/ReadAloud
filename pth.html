<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Bank - Standard Putonghua</title>
    <style>
        :root {
            --apple-gray: #f5f5f7;
            --apple-blue: #0071e3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 40px;
        }
        .vocab-card {
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border: 1px solid #d2d2d7;
            margin-bottom: 20px;
        }
        .vocab-item {
            font-size: 32px;
            font-weight: 500;
            color: #1d1d1f;
            display: block;
            margin-bottom: 10px;
        }
        button {
            background-color: var(--apple-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 980px;
            font-size: 16px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        button:active {
            transform: scale(0.95);
        }
        .hint {
            font-size: 12px;
            color: #86868b;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vocab Bank</h1>
        
        <div class="vocab-card">
            <span class="vocab-item" id="vocabText">環境保護</span>
            <button onclick="speakPutonghua()">播放發音</button>
        </div>

        <div class="hint">使用 Google TTS 高音質普通話接口</div>
    </div>

    <script>
        /**
         * 強制使用 Google Translate TTS 發音
         * 優點：無視裝置系統語言，確保 100% 普通話，音質極佳。
         */
        function speakPutonghua() {
            const text = document.getElementById('vocabText').innerText;
            
            // 構建 Google TTS URL
            // tl=zh-CN 指定普通話
            // client=tw-ob 是目前最穩定的開源參數
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=zh-CN&client=tw-ob`;

            const audio = new Audio(url);

            // 播放處理
            audio.play().catch(e => {
                console.error("播放失敗：可能是瀏覽器自動播放限制或網路問題", e);
                alert("無法播放，請確保網路連線正常。");
            });
        }

        // 針對鍵盤愛好者的優化：按 Enter 鍵觸發發音
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                speakPutonghua();
            }
        });
    </script>
</body>
</html>
