<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reading Coach</title>
    <style>
        :root {
            --system-blue: #007aff;
            --system-green: #34c759;
            --system-red: #ff3b30;
            --system-gray-bg: #f5f5f7;
            --system-card-bg: #ffffff;
            --system-btn-grey: #f2f2f7;
            --system-btn-active: #e5e5ea;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--system-gray-bg);
            color: var(--text-primary);
            margin: 0; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        h1 { font-weight: 600; font-size: 24px; position: fixed; top: 20px; left: 30px; margin: 0; }

        .mode-nav {
            position: fixed; top: 20px; right: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 4px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);
            display: flex; gap: 4px; z-index: 1000;
        }

        .mode-btn {
            border: none; background: transparent; padding: 6px 14px;
            border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; color: var(--text-secondary);
        }

        .mode-btn.active { background: white; color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .container { width: 100%; max-width: 600px; display: none; animation: fadeIn 0.4s ease; }
        .container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--system-card-bg); padding: 30px; border-radius: var(--radius); box-shadow: 0 4px 24px rgba(0,0,0,0.04); margin-bottom: 20px; position: relative; }
        
        input, textarea {
            width: 100%; padding: 14px; border: 1px solid #d2d2d7; border-radius: 12px;
            font-size: 16px; margin-bottom: 12px; box-sizing: border-box; outline: none; font-family: inherit;
            background: #fafafa;
        }

        .apple-btn {
            background: var(--system-btn-grey); color: var(--text-primary); border: none;
            padding: 14px 24px; border-radius: 24px; font-weight: 600;
            cursor: pointer; width: 100%; font-size: 15px; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .apple-btn:active { background: var(--system-btn-active); transform: scale(0.98); }

        .btn-recording {
            background: var(--system-red) !important;
            color: white !important;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .error-msg {
            color: var(--system-red); font-size: 13px; font-weight: 500;
            text-align: center; margin-bottom: 10px; display: none;
        }

        .mic-test-area { margin-top: 20px; padding: 15px; background: #fafafa; border-radius: 12px; border: 1px dashed #d2d2d7; text-align: center; }
        .meter-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .meter-fill { height: 100%; width: 0%; background: var(--system-green); transition: width 0.1s; }

        .passage-wrapper { display: grid; grid-template-columns: 1fr 44px; align-items: center; gap: 16px; margin: 30px 0; min-height: 80px; }
        #passageDisplay, #feedbackArea { font-size: 22px; font-weight: 500; line-height: 1.5; margin: 0; }
        .word-correct { color: var(--system-green); }
        .word-wrong { color: var(--system-red); text-decoration: underline; }
        .progress-text { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; }

        .speak-icon { width: 44px; height: 44px; background: var(--system-btn-grey); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .speak-icon svg { width: 20px; height: 20px; fill: var(--text-secondary); }

        .retry-link { background: none; border: none; color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; padding: 10px; margin-top: 10px; opacity: 0.6; text-decoration: underline; }
        
        .id-badge { background: var(--system-btn-grey); padding: 20px; border-radius: 14px; text-align: center; font-family: monospace; font-size: 24px; margin: 20px 0; border: 1px solid #d2d2d7; }
        
        .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Reading</h1>

    <div class="mode-nav">
        <button class="mode-btn active" id="btnStudent" onclick="switchView('student')">Student</button>
        <button class="mode-btn" id="btnTeacher">Teacher Hub</button>
    </div>

    <div id="studentView" class="container active">
        <div class="card" id="studentEntry">
            <h2 style="margin-top:0">Practice Reading</h2>
            <div id="joinError" class="error-msg">Invalid Task ID. Please try again.</div>
            <input type="text" id="sTaskId" placeholder="Enter Task ID">
            <button class="apple-btn" id="btnJoin" onclick="fetchTask()">Join Task</button>

            <div class="mic-test-area">
                <span style="font-size: 12px; color: var(--text-secondary)">Test your microphone:</span>
                <button class="retry-link" id="testMicBtn" style="text-decoration: none; font-weight: 700; color: var(--system-blue)" onclick="toggleMicTest()">Test Mic</button>
                <div class="meter-bg"><div id="micMeter" class="meter-fill"></div></div>
            </div>
        </div>

        <div id="readingSection" class="card" style="display:none">
            <div class="student-header">
                <span class="progress-text">Student Details</span>
                <button class="retry-link" style="margin:0; padding:0;" onclick="clearSavedInfo()">Clear info</button>
            </div>
            <div id="studentInfo">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <input type="text" id="sClass" placeholder="Class" oninput="saveInfo()">
                    <input type="number" id="sNo" placeholder="No." oninput="saveInfo()">
                </div>
                <input type="text" id="sName" placeholder="Name" oninput="saveInfo()">
            </div>
            
            <div id="practiceArea">
                <div class="progress-text" id="chunkProgress"></div>
                <div class="passage-wrapper">
                    <div id="textContainer">
                        <div id="passageDisplay"></div>
                        <div id="feedbackArea"></div>
                    </div>
                    <button class="speak-icon" onclick="playText()">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>
                
                <button id="recordBtn" class="apple-btn" onclick="toggleRecording()">🎤 Start Reading</button>

                <div id="postReadingActions" style="display:none; flex-direction: column; align-items: center; width: 100%;">
                    <button id="nextChunkBtn" class="apple-btn" style="color: var(--system-blue)" onclick="nextChunk()">
                        <span id="nextBtnText">Next Sentence →</span>
                    </button>
                    <button class="retry-link" onclick="retrySentence()">Retry this sentence</button>
                </div>
            </div>

            <div id="resultScreen" style="display:none; text-align:center;">
                <h2 id="finalScoreDisplay" style="font-size: 42px; color: var(--system-green);">0%</h2>
                <div id="leaderboardList"></div>
                <button class="apple-btn" onclick="location.reload()" style="margin-top: 20px;">Back to Home</button>
            </div>
        </div>
    </div>

    <div id="teacherView" class="container">
        <div class="card">
            <input type="email" id="tEmail" placeholder="Teacher Email">
            <textarea id="tPassage" placeholder="Paste reading passage..." rows="5"></textarea>
            <button class="apple-btn" onclick="createTask()">Generate Task ID</button>
            <div id="displayId" class="id-badge" style="display:none"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwe3Oci_vG0U4Qgi9IBCdj62xuStlwhrIxsOvVdGvYUtn_vO29KcJ1DDL9utPMWvmsI/exec";
        let chunks = [], currentChunkIdx = 0, totalMatches = 0, totalWords = 0, tempMatches = 0, tempTotal = 0;
        let recognition, isRecording = false;

        window.onload = () => { loadInfo(); };

        function saveInfo() {
            const info = { class: document.getElementById('sClass').value, no: document.getElementById('sNo').value, name: document.getElementById('sName').value };
            localStorage.setItem('studentInfo', JSON.stringify(info));
        }

        function loadInfo() {
            const saved = localStorage.getItem('studentInfo');
            if (saved) {
                const info = JSON.parse(saved);
                document.getElementById('sClass').value = info.class || "";
                document.getElementById('sNo').value = info.no || "";
                document.getElementById('sName').value = info.name || "";
            }
        }

        function clearSavedInfo() {
            if(confirm("Clear student details?")) {
                localStorage.removeItem('studentInfo');
                document.getElementById('sClass').value = "";
                document.getElementById('sNo').value = "";
                document.getElementById('sName').value = "";
            }
        }

        async function fetchTask() {
            const id = document.getElementById('sTaskId').value;
            const errBox = document.getElementById('joinError');
            if(!id) return;

            try {
                const res = await fetch(`${API_URL}?action=getTask&taskId=${id}`);
                const data = await res.json();
                
                if (data.passage === "NOT_FOUND") {
                    errBox.style.display = "block";
                    setTimeout(() => { errBox.style.display = "none"; }, 3000);
                    return;
                }

                chunks = data.passage.match(/[^.!?]+[.!?]+/g) || [data.passage];
                document.getElementById('studentEntry').style.display = 'none';
                document.getElementById('readingSection').style.display = 'block';
                showChunk();
            } catch (e) {
                alert("Connection error. Please try again.");
            }
        }

        function playText() {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(chunks[currentChunkIdx]);
            const voices = window.speechSynthesis.getVoices();
            const enVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en-GB')) || voices[0];
            utter.voice = enVoice; utter.lang = 'en-US'; utter.rate = 0.85;
            window.speechSynthesis.speak(utter);
        }

        let audioContext, analyser, microphone, scriptProcessor, testingMic = false;
        async function toggleMicTest() {
            const btn = document.getElementById('testMicBtn');
            const meter = document.getElementById('micMeter');
            if (testingMic) { if (audioContext) audioContext.close(); btn.innerText = "Test Mic"; meter.style.width = "0%"; testingMic = false; return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext(); analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream); scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);
                microphone.connect(analyser); analyser.connect(scriptProcessor); scriptProcessor.connect(audioContext.destination);
                scriptProcessor.onaudioprocess = () => {
                    const array = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(array);
                    meter.style.width = Math.min((array.reduce((a, b) => a + b) / array.length) * 2, 100) + "%";
                };
                btn.innerText = "Stop Test"; testingMic = true;
            } catch (err) { alert("Mic access denied."); }
        }

        function toggleRecording() {
            if (!isRecording) startRecording();
            else stopRecording();
        }

        function startRecording() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = false;
            const rb = document.getElementById('recordBtn');

            recognition.onstart = () => {
                isRecording = true;
                rb.innerText = "⏹ Stop & Analyze";
                rb.classList.add('btn-recording');
            };

            recognition.onresult = (event) => {
                let finalTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                }
                processResult(finalTranscript);
            };

            recognition.onerror = () => { resetMicButton(); };
            recognition.onend = () => { resetMicButton(); };
            recognition.start();
        }

        function stopRecording() { if (recognition) recognition.stop(); }

        function resetMicButton() {
            isRecording = false;
            const rb = document.getElementById('recordBtn');
            rb.innerText = "🎤 Start Reading";
            rb.classList.remove('btn-recording');
        }

        function processResult(transcript) {
            if (!transcript) return;
            const clean = (s) => s.toLowerCase().replace(/[^\w\s]/g, "");
            const targetWords = chunks[currentChunkIdx].trim().split(/\s+/);
            const attemptWords = clean(transcript).split(/\s+/);
            let html = "", matches = 0;
            targetWords.forEach(word => {
                if(attemptWords.includes(clean(word))) { html += `<span class="word-correct">${word} </span>`; matches++; }
                else { html += `<span class="word-wrong">${word} </span>`; }
            });
            tempMatches = matches; tempTotal = targetWords.length;
            document.getElementById('passageDisplay').style.display = "none";
            document.getElementById('feedbackArea').innerHTML = html;
            document.getElementById('recordBtn').style.display = "none";
            document.getElementById('postReadingActions').style.display = "flex";
            resetMicButton();
        }

        function retrySentence() {
            document.getElementById('passageDisplay').style.display = "block";
            document.getElementById('feedbackArea').innerHTML = "";
            document.getElementById('recordBtn').style.display = "block";
            document.getElementById('postReadingActions').style.display = "none";
            resetMicButton();
        }

        async function nextChunk() {
            totalMatches += tempMatches;
            totalWords += tempTotal;
            if(currentChunkIdx < chunks.length - 1) { currentChunkIdx++; showChunk(); }
            else { submitFinal(); }
        }

        function showChunk() {
            document.getElementById('chunkProgress').innerText = `Sentence ${currentChunkIdx+1} of ${chunks.length}`;
            document.getElementById('passageDisplay').innerText = chunks[currentChunkIdx];
            document.getElementById('passageDisplay').style.display = "block";
            document.getElementById('feedbackArea').innerHTML = "";
            document.getElementById('recordBtn').style.display = "block";
            document.getElementById('postReadingActions').style.display = "none";
            document.getElementById('nextBtnText').innerText = (currentChunkIdx === chunks.length-1) ? "Finish & Submit 🎉" : "Next Sentence →";
            resetMicButton();
        }

        async function submitFinal() {
            const s = Math.round((totalMatches/totalWords)*100);
            document.getElementById('practiceArea').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('finalScoreDisplay').innerText = s + "%";
            
            const taskId = document.getElementById('sTaskId').value;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'submitScore', taskId, className: document.getElementById('sClass').value, classNo: document.getElementById('sNo').value, name: document.getElementById('sName').value, score: s }) });
        }

        function switchView(v) {
            document.getElementById('studentView').classList.toggle('active', v==='student');
            document.getElementById('teacherView').classList.toggle('active', v==='teacher');
        }
    </script>
</body>
</html>
